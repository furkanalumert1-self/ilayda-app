<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>İlayda için ♥</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="İlayda ♥">
<meta name="theme-color" content="#e8748a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root {
    --rose: #e8748a; --blush: #f7c5ce; --petal: #fdeef1;
    --deep: #b84d63; --cream: #fff8f9; --text: #5a2d3a; --soft: #c98a96;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* PETALS */
  .petals-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal { position: absolute; font-size: 1.2rem; opacity: 0.15; animation: floatPetal linear infinite; }
  @keyframes floatPetal {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; } 90% { opacity: 0.15; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  /* NAV */
  nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--blush); display: flex; justify-content: space-around; padding: 12px 0 20px; z-index: 100; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--soft); font-family: 'Lato', sans-serif; font-size: 10px; letter-spacing: 0.5px; transition: all 0.3s; padding: 4px 12px; }
  .nav-btn.active { color: var(--rose); }
  .nav-btn .icon { font-size: 22px; }

  .page { display: none; min-height: 100vh; padding: 0 0 90px; position: relative; z-index: 1; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .page.active > * { animation: fadeIn 0.35s ease forwards; }

  /* HOME */
  .home-header { background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 50%, #fce4ec 100%); padding: 60px 24px 50px; text-align: center; position: relative; overflow: hidden; }
  .home-header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(232,116,138,0.15) 0%, transparent 50%); }
  .heart-icon { font-size: 50px; display: block; margin-bottom: 12px; animation: heartbeat 1.5s ease-in-out infinite; }
  @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  .home-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; color: var(--deep); margin-bottom: 4px; }
  .home-subtitle { font-size: 13px; color: var(--soft); letter-spacing: 2px; text-transform: uppercase; }

  /* COUNTER */
  .counter-card { margin: -24px 20px 0; background: white; border-radius: 24px; padding: 28px 24px; box-shadow: 0 8px 40px rgba(232,116,138,0.2); text-align: center; position: relative; z-index: 2; }
  .counter-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--soft); margin-bottom: 8px; }
  .counter-number { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 700; line-height: 1; background: linear-gradient(135deg, var(--rose), var(--deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .counter-unit { font-size: 14px; color: var(--soft); margin-top: 4px; }
  .counter-detail { display: flex; justify-content: center; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--petal); }
  .counter-detail-item { text-align: center; }
  .counter-detail-item .num { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--deep); font-weight: 700; }
  .counter-detail-item .lbl { font-size: 10px; color: var(--soft); letter-spacing: 1px; }

  /* SECTION */
  .section { padding: 28px 20px 0; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--deep); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .add-btn { background: var(--rose); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(232,116,138,0.4); flex-shrink: 0; }

  /* EVENTS */
  .event-card { background: white; border-radius: 16px; padding: 16px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 16px rgba(232,116,138,0.1); border-left: 4px solid var(--blush); transition: transform 0.15s, background 0.15s; user-select: none; -webkit-user-select: none; }
  .event-card.pressing { transform: scale(0.97); background: var(--petal); }
  .event-emoji { font-size: 28px; }
  .event-info { flex: 1; }
  .event-name { font-size: 15px; color: var(--text); margin-bottom: 2px; }
  .event-date { font-size: 12px; color: var(--soft); }
  .event-countdown { background: linear-gradient(135deg, var(--rose), var(--deep)); color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; text-align: center; min-width: 60px; }
  .event-countdown .days { font-family: 'Playfair Display', serif; font-size: 18px; display: block; }

  /* INFO CARDS */
  .page-header { padding: 50px 24px 24px; background: linear-gradient(160deg, #fce4ec 0%, #fdeef1 100%); text-align: center; }
  .page-header h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; color: var(--deep); }
  .page-header p { font-size: 12px; color: var(--soft); margin-top: 4px; letter-spacing: 1px; }
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
  .info-card { background: white; border-radius: 20px; padding: 20px 14px; text-align: center; box-shadow: 0 4px 20px rgba(232,116,138,0.12); transition: transform 0.15s; user-select: none; -webkit-user-select: none; }
  .info-card.pressing { transform: scale(0.94); }
  .info-card.wide { grid-column: span 2; }
  .info-card .card-icon { font-size: 32px; margin-bottom: 8px; display: block; }
  .info-card .card-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--soft); margin-bottom: 6px; }
  .info-card .card-value { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text); line-height: 1.4; }
  .info-card.highlight { background: linear-gradient(135deg, #fce4ec, #fdeef1); border: 1px solid var(--blush); }
  .info-card.alert-card { background: linear-gradient(135deg, #fff8e1, #fffde7); border: 1px solid #ffe082; }
  .info-card.alert-card .card-value { font-size: 13px; color: #795548; }

  /* GALLERY */
  .gallery-header { padding: 50px 24px 24px; background: linear-gradient(160deg, #fce4ec 0%, #fdeef1 100%); text-align: center; }
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; padding: 16px 16px 0; }
  .gallery-item { position: relative; aspect-ratio: 1; overflow: hidden; border-radius: 12px; background: var(--petal); display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; transition: transform 0.15s; }
  .gallery-item.pressing { transform: scale(0.94); }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .gallery-item .cap-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(90,45,58,0.75)); padding: 18px 8px 8px; }
  .gallery-item .cap-text { color: white; font-size: 11px; letter-spacing: 0.5px; }
  .gallery-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--blush); font-size: 12px; aspect-ratio: 1; border: 2px dashed var(--blush); border-radius: 12px; cursor: pointer; }
  .gallery-placeholder .plus { font-size: 32px; color: var(--rose); }
  .upload-hint { text-align: center; padding: 16px; font-size: 12px; color: var(--soft); }

  /* TIMELINE */
  .timeline-container { padding: 20px 20px 0; position: relative; }
  .timeline-line { position: absolute; left: 36px; top: 20px; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--rose), var(--blush)); }
  .timeline-item { display: flex; gap: 16px; margin-bottom: 24px; user-select: none; -webkit-user-select: none; }
  .timeline-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--rose); border: 3px solid white; box-shadow: 0 0 0 2px var(--rose); flex-shrink: 0; margin-top: 4px; z-index: 1; margin-left: 4px; }
  .timeline-dot.fixed { background: var(--blush); box-shadow: 0 0 0 2px var(--blush); }
  .timeline-content { background: white; border-radius: 16px; padding: 14px 16px; flex: 1; box-shadow: 0 2px 16px rgba(232,116,138,0.1); transition: transform 0.15s, background 0.15s; }
  .timeline-item.pressing .timeline-content { transform: scale(0.97); background: var(--petal); }
  .timeline-date { font-size: 10px; color: var(--rose); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
  .timeline-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text); margin-bottom: 4px; }
  .timeline-desc { font-size: 13px; color: var(--soft); line-height: 1.5; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 75vh; border-radius: 12px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; }
  .lightbox-caption { color: white; font-family: 'Playfair Display', serif; font-style: italic; margin-top: 16px; font-size: 16px; text-align: center; }

  /* BUTTONS */
  .add-memory-btn { display: block; margin: 20px auto; background: linear-gradient(135deg, var(--rose), var(--deep)); color: white; border: none; border-radius: 50px; padding: 14px 32px; font-family: 'Lato', sans-serif; font-size: 14px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 20px rgba(232,116,138,0.4); }
  .add-memory-btn:active { transform: scale(0.97); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(90,45,58,0.5); z-index: 150; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 28px 28px 0 0; padding: 28px 24px 40px; width: 100%; animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--deep); margin-bottom: 20px; text-align: center; }
  .modal input, .modal textarea { width: 100%; border: 1.5px solid var(--blush); border-radius: 12px; padding: 12px 14px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); background: var(--petal); margin-bottom: 12px; outline: none; resize: none; }
  .modal input:focus, .modal textarea:focus { border-color: var(--rose); }
  .modal-btn { width: 100%; background: linear-gradient(135deg, var(--rose), var(--deep)); color: white; border: none; border-radius: 14px; padding: 16px; font-family: 'Lato', sans-serif; font-size: 15px; cursor: pointer; margin-top: 8px; }
  .modal-cancel { width: 100%; background: none; border: none; color: var(--soft); font-size: 14px; padding: 12px; cursor: pointer; font-family: 'Lato', sans-serif; }

  /* CONTEXT MENU */
  .ctx-backdrop { display: none; position: fixed; inset: 0; z-index: 299; }
  .ctx-backdrop.open { display: block; }
  .ctx-menu { display: none; position: fixed; background: white; border-radius: 18px; box-shadow: 0 8px 40px rgba(90,45,58,0.25); overflow: hidden; z-index: 300; min-width: 190px; animation: popIn 0.15s ease; }
  .ctx-menu.open { display: block; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .ctx-item { padding: 16px 20px; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--petal); }
  .ctx-item:last-child { border-bottom: none; }
  .ctx-item:active { background: var(--petal); }
  .ctx-item.danger { color: #e53935; }
</style>
</head>
<body>

<div class="petals-bg" id="petals"></div>

<!-- ===== HOME ===== -->
<div class="page active" id="page-home">
  <div class="home-header">
    <span class="heart-icon">♥</span>
    <h1 class="home-title">İlayda'ya Özel</h1>
    <p class="home-subtitle">Her şey seninle güzel</p>
  </div>
  <div class="counter-card">
    <p class="counter-label">Birlikte geçen günler</p>
    <div class="counter-number" id="dayCount">0</div>
    <p class="counter-unit">gün</p>
    <div class="counter-detail">
      <div class="counter-detail-item"><div class="num" id="weekCount">0</div><div class="lbl">Hafta</div></div>
      <div class="counter-detail-item"><div class="num" id="monthCount">0</div><div class="lbl">Ay</div></div>
      <div class="counter-detail-item"><div class="num" id="hourCount">0</div><div class="lbl">Saat</div></div>
    </div>
  </div>
  <div class="section">
    <h2 class="section-title">
      <span>🗓 Yaklaşan Günler</span>
      <button class="add-btn" onclick="openEventModal()">+</button>
    </h2>
    <div id="eventsContainer"></div>
  </div>
</div>

<!-- ===== İLAYDA ===== -->
<div class="page" id="page-cards">
  <div class="page-header" style="position:relative;">
    <h1>İlayda Hakkında</h1>
    <button class="add-btn" onclick="openNewCardModal()" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);">+</button>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- ===== GALERİ ===== -->
<div class="page" id="page-gallery">
  <div class="gallery-header">
    <h1 style="font-family:'Playfair Display',serif;font-style:italic;font-size:26px;color:var(--deep)">Anılarımız</h1>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
  <p class="upload-hint">Fotoğraf eklemek için + butonuna bas</p>
  <button class="add-memory-btn" onclick="openGalleryUpload()">+ Fotoğraf Ekle</button>
</div>

<!-- ===== ZAMAN TÜNELİ ===== -->
<div class="page" id="page-timeline">
  <div class="page-header" style="display:flex;flex-direction:column;align-items:center;">
    <h1 style="font-family:'Playfair Display',serif;font-style:italic;font-size:26px;color:var(--deep)">Zaman Tüneli</h1>
  </div>
  <div class="timeline-container">
    <div class="timeline-line"></div>
    <div id="timelineItems"></div>
  </div>
  <button class="add-memory-btn" onclick="openMemoryModal()">+ Anı Ekle</button>
</div>

<!-- NAV -->
<nav>
  <button class="nav-btn active" onclick="showPage('home',this)"><span class="icon">🏠</span><span>Ana Sayfa</span></button>
  <button class="nav-btn" onclick="showPage('cards',this)"><span class="icon">💝</span><span>İlayda</span></button>
  <button class="nav-btn" onclick="showPage('gallery',this)"><span class="icon">📸</span><span>Anılar</span></button>
  <button class="nav-btn" onclick="showPage('timeline',this)"><span class="icon">✨</span><span>Zaman</span></button>
</nav>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h3 id="eventModalTitle">Yeni Gün Ekle</h3>
    <input type="text" id="eventEmoji" placeholder="Emoji (örn: 🎂)" maxlength="4">
    <input type="text" id="eventName" placeholder="Etkinlik adı">
    <input type="date" id="eventDate">
    <button class="modal-btn" onclick="saveEvent()">Kaydet ♥</button>
    <button class="modal-cancel" onclick="closeEventModal()">İptal</button>
  </div>
</div>

<!-- CARD MODAL -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <h3 id="cardModalTitle">Kartı Düzenle</h3>
    <input type="text" id="cardIcon" placeholder="Emoji (örn: 🌸)" maxlength="4">
    <input type="text" id="cardLabel" placeholder="Kart başlığı (örn: En Sevdiği Çiçek)">
    <input type="text" id="cardValue" placeholder="Değer (örn: Şakayık)">
    <button class="modal-btn" onclick="saveCard()">Kaydet ♥</button>
    <button class="modal-cancel" onclick="closeCardModal()">İptal</button>
  </div>
</div>

<!-- MEMORY MODAL -->
<div class="modal-overlay" id="memoryModal">
  <div class="modal">
    <h3 id="memoryModalTitle">Yeni Anı</h3>
    <input type="text" id="memoryTitle" placeholder="Başlık (örn: İlk buluşmamız)">
    <input type="date" id="memoryDate">
    <textarea id="memoryDesc" rows="3" placeholder="Bu anıyı anlat..."></textarea>
    <button class="modal-btn" onclick="saveMemory()">Kaydet ♥</button>
    <button class="modal-cancel" onclick="closeMemoryModal()">İptal</button>
  </div>
</div>

<!-- GALLERY UPLOAD MODAL -->
<div class="modal-overlay" id="galleryModal">
  <div class="modal">
    <h3>Fotoğraf Ekle</h3>
    <input type="text" id="photoCaption" placeholder="Bu fotoğraf nerede çekildi?">
    <input type="file" id="photoFile" accept="image/*" style="border:none;background:none;padding:8px 0;margin-bottom:12px;">
    <button class="modal-btn" onclick="savePhoto()">Ekle ♥</button>
    <button class="modal-cancel" onclick="closeGalleryModal()">İptal</button>
  </div>
</div>

<!-- PHOTO CAPTION EDIT MODAL -->
<div class="modal-overlay" id="photoCaptionModal">
  <div class="modal">
    <h3>Açıklamayı Düzenle</h3>
    <input type="text" id="photoCaptionEdit" placeholder="Fotoğraf açıklaması">
    <button class="modal-btn" onclick="savePhotoCaption()">Kaydet ♥</button>
    <button class="modal-cancel" onclick="closePhotoCaptionModal()">İptal</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-backdrop" id="ctxBackdrop" onclick="closeCtxMenu()"></div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxAction('edit')">✏️ Düzenle</div>
  <div class="ctx-item danger" onclick="ctxAction('delete')">🗑️ Sil</div>
</div>

<script>
// ===== PETALS =====
const petalsEl = document.getElementById('petals');
['🌸','🌹','🌺','💗','✨','🌷'].forEach(e => {
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    p.className = 'petal'; p.textContent = e;
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    petalsEl.appendChild(p);
  }
});

// ===== COUNTER =====
const startDate = new Date('2025-05-09T00:00:00');
function updateCounter() {
  const diff = Date.now() - startDate;
  document.getElementById('dayCount').textContent = Math.floor(diff / 86400000).toLocaleString('tr');
  document.getElementById('weekCount').textContent = Math.floor(diff / 604800000);
  document.getElementById('monthCount').textContent = Math.floor(diff / 2629800000);
  document.getElementById('hourCount').textContent = Math.floor(diff / 3600000).toLocaleString('tr');
}
updateCounter();
setInterval(updateCounter, 60000);

// ===== NAV =====
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// ===== STORAGE =====
const store = {
  get: k => JSON.parse(localStorage.getItem(k) || 'null'),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// Versiyon kontrolü — veri değişince eski localStorage'ı temizle
const DATA_VERSION = '6';
if (store.get('ilayda_data_version') !== DATA_VERSION) {
  localStorage.removeItem('ilayda_events');
  localStorage.removeItem('ilayda_cards');
  localStorage.removeItem('ilayda_memories');
  store.set('ilayda_data_version', DATA_VERSION);
}

// ===== LONG PRESS =====
function addLongPress(el, cb) {
  let timer, sx, sy;
  const start = e => {
    sx = e.touches ? e.touches[0].clientX : e.clientX;
    sy = e.touches ? e.touches[0].clientY : e.clientY;
    el.classList.add('pressing');
    timer = setTimeout(() => {
      el.classList.remove('pressing');
      navigator.vibrate && navigator.vibrate(40);
      cb(e);
    }, 500);
  };
  const move = e => {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    if (Math.abs(x - sx) > 10 || Math.abs(y - sy) > 10) cancel();
  };
  const cancel = () => { clearTimeout(timer); el.classList.remove('pressing'); };
  el.addEventListener('touchstart', start, { passive: true });
  el.addEventListener('touchmove', move, { passive: true });
  el.addEventListener('touchend', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mousemove', move);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
  el.addEventListener('contextmenu', e => e.preventDefault());
}

// ===== CONTEXT MENU =====
let ctxTarget = null;
function openCtxMenu(e, type, index) {
  ctxTarget = { type, index };
  const menu = document.getElementById('ctxMenu');
  const src = e.changedTouches ? e.changedTouches[0] : e.touches ? e.touches[0] : e;
  const x = Math.min(src.clientX || 80, window.innerWidth - 210);
  const y = Math.min(src.clientY || 80, window.innerHeight - 130);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('open');
  document.getElementById('ctxBackdrop').classList.add('open');
}
function closeCtxMenu() {
  document.getElementById('ctxMenu').classList.remove('open');
  document.getElementById('ctxBackdrop').classList.remove('open');
  ctxTarget = null;
}
function ctxAction(action) {
  if (!ctxTarget) return;
  const { type, index } = ctxTarget;
  closeCtxMenu();
  if (type === 'event') {
    if (action === 'edit') openEventModal(index);
    else { const evs = getEvents(); evs.splice(index, 1); store.set('ilayda_events', evs); renderEvents(); }
  } else if (type === 'card') {
    if (action === 'edit') openCardModal(index);
    else {
      const cards = getCards();
      cards.splice(index, 1);
      store.set('ilayda_cards', cards);
      renderCards();
    }
  } else if (type === 'memory') {
    if (action === 'edit') openMemoryModal(index);
    else {
      allMemories.splice(index, 1);
      // Separate back into fixed and user memories
      const newFixed = allMemories.filter(m => m.fixed);
      const newUser = allMemories.filter(m => !m.fixed);
      fixedMemories.length = 0;
      newFixed.forEach(m => fixedMemories.push(m));
      memories = newUser;
      store.set('ilayda_memories', memories);
      store.set('ilayda_fixed_memories', fixedMemories.map(m => ({...m})));
      renderTimeline();
    }
  } else if (type === 'photo') {
    if (action === 'edit') openPhotoCaptionModal(index);
    else { photos.splice(index, 1); store.set('ilayda_photos', photos); renderGallery(); }
  }
}

];
function getEvents() { return store.get('ilayda_events') || JSON.parse(JSON.stringify(defaultEvents)); }

function daysUntil(dateStr) {
  const t = new Date(dateStr), n = new Date();
  n.setHours(0,0,0,0); t.setHours(0,0,0,0);
  let d = Math.ceil((t - n) / 86400000);
  if (d < 0) { t.setFullYear(t.getFullYear() + 1); d = Math.ceil((t - n) / 86400000); }
  return d;
}

function renderEvents() {
  const evs = getEvents();
  const container = document.getElementById('eventsContainer');
  container.innerHTML = '';
  evs.forEach((ev, i) => {
    const dateLabel = new Date(ev.date).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
    const days = daysUntil(ev.date);
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <span class="event-emoji">${ev.emoji}</span>
      <div class="event-info">
        <div class="event-name">${ev.name}</div>
        <div class="event-date">${dateLabel}</div>
      </div>
      <div class="event-countdown"><span class="days">${days}</span><span>gün</span></div>
    `;
    addLongPress(card, e => openCtxMenu(e, 'event', i));
    container.appendChild(card);
  });
}

function openMemoryModal(idx = null) {
  editMemoryIdx = idx;
  document.getElementById('memoryModalTitle').textContent = idx !== null ? 'Anıyı Düzenle' : 'Yeni Anı';
  if (idx !== null) {
    const m = allMemories[idx];
    document.getElementById('memoryTitle').value = m.title;
    document.getElementById('memoryDate').value = m.rawDate || '';
    document.getElementById('memoryDesc').value = m.desc || '';
  } else {
    document.getElementById('memoryTitle').value = '';
    document.getElementById('memoryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('memoryDesc').value = '';
  }
  document.getElementById('memoryModal').classList.add('open');
}
function closeMemoryModal() { document.getElementById('memoryModal').classList.remove('open'); }
function saveMemory() {
  const title = document.getElementById('memoryTitle').value.trim();
  const rawDate = document.getElementById('memoryDate').value;
  const desc = document.getElementById('memoryDesc').value.trim();
  if (!title) return;

  if (editMemoryIdx !== null) {
    // Editing existing — figure out if it's fixed or user
    const existing = allMemories[editMemoryIdx];
    const dateLabel = rawDate
      ? new Date(rawDate).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' })
      : existing.date;
    const updated = { ...existing, date: dateLabel, rawDate: rawDate || existing.rawDate, title, desc };
    if (existing.fixed) {
      const fixedIdx = fixedMemories.findIndex(f => f === existing || (f.date === existing.date && f.title === existing.title));
      if (fixedIdx !== -1) fixedMemories[fixedIdx] = updated;
      store.set('ilayda_fixed_memories', fixedMemories.map(m => ({...m})));
    } else {
      const userIdx = editMemoryIdx - fixedMemories.length;
      memories[userIdx] = updated;
      store.set('ilayda_memories', memories);
    }
  } else {
    if (!rawDate) return;
    const dateLabel = new Date(rawDate).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
    memories.push({ date: dateLabel, rawDate, title, desc });
    store.set('ilayda_memories', memories);
  }
  renderTimeline();
  closeMemoryModal();
}
