function init() {
  var list = document.getElementById('list');
  for (var i = 0; i < photos.length; i++) {
    var row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = '<span class="num">' + (i+1) + '</span>' +
      '<img src="' + photos[i].src + '" loading="lazy">' +
      '<input type="text" id="c' + i + '" value="Guzel bir an" placeholder="Aciklama...">';
    list.appendChild(row);
  }
}

function saveAll() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Kaydediliyor...';
  document.getElementById('log').innerHTML = 'JSONBin e yaziliyor...';

  var updated = [];
  for (var i = 0; i < photos.length; i++) {
    var cap = document.getElementById('c' + i);
    updated.push({
      src: photos[i].src,
      caption: cap ? (cap.value.trim() || 'Guzel bir an') : 'Guzel bir an',
      public_id: photos[i].public_id
    });
  }

  // Get current data first
  fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
    headers: {'X-Master-Key': JSONBIN_KEY}
  })
  .then(function(r) { return r.json(); })
  .then(function(j) {
    var current = j.record || {};
    current.photos = updated;
    return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY},
      body: JSON.stringify(current)
    });
  })
  .then(function(r) {
    if (r.ok) {
      document.getElementById('log').innerHTML = '<span class="ok">56 fotograf basariyla kaydedildi! Simdi ana uygulamayi ac, Anilarimiz sekmesine git.</span>';
    } else {
      return r.text().then(function(t) {
        document.getElementById('log').innerHTML = '<span class="err">Hata: ' + t + '</span>';
      });
    }
    btn.textContent = 'Tumunu JSONBin e Kaydet';
    btn.disabled = false;
  })
  .catch(function(e) {
    document.getElementById('log').innerHTML = '<span class="err">Baglanti hatasi: ' + e.message + '</span>';
    btn.textContent = 'Tumunu JSONBin e Kaydet';
    btn.disabled = false;
  });
}

init();
</script>
